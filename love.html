<!DOCTYPE html>

<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Funa 💗</title>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Kanit',sans-serif;
}

body{
height:100vh;
background:linear-gradient(135deg,#ffd9ef,#ffe8f7,#fff4fb);
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

.container{
text-align:center;
backdrop-filter:blur(20px);
background:rgba(255,255,255,0.35);
padding:60px;
border-radius:30px;
box-shadow:0 20px 60px rgba(255,120,180,0.35);
animation:fadeIn 2s;
}

h1{
font-size:55px;
color:#ff4d9b;
}

.name{
font-size:75px;
color:#ff2e86;
font-weight:600;
text-shadow:0 0 25px rgba(255,80,150,0.6);
animation:pulse 2s infinite;
}

button{
margin-top:40px;
padding:15px 45px;
font-size:18px;
border:none;
border-radius:40px;
background:linear-gradient(45deg,#ff6db3,#ff2f7a);
color:white;
cursor:pointer;
box-shadow:0 10px 25px rgba(255,60,140,0.4);
transition:0.3s;
}

button:hover{
transform:scale(1.08);
}

.watermark{
position:fixed;
bottom:10px;
width:100%;
text-align:center;
letter-spacing:4px;
color:#ff7fb6;
font-size:13px;
opacity:0.6;
}

/* BOOK */

.book{
position:fixed;
width:420px;
height:260px;
background:white;
border-radius:15px;
box-shadow:0 20px 50px rgba(0,0,0,0.2);
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
color:#ff3f8e;
transform:scale(0);
transition:0.6s;
}

.book.open{
transform:scale(1);
}

.book-page{
position:absolute;
width:100%;
height:100%;
background:linear-gradient(135deg,#fff0f8,#ffe4f2);
border-radius:15px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:40px;
text-align:center;
}

/* HEART EXPLOSION */

.heart{
position:fixed;
width:18px;
height:18px;
background:#ff4fa0;
transform:rotate(45deg);
animation:explode 2s forwards;
}

.heart::before,
.heart::after{
content:"";
position:absolute;
width:18px;
height:18px;
background:#ff4fa0;
border-radius:50%;
}

.heart::before{
top:-9px;
left:0;
}

.heart::after{
left:-9px;
top:0;
}

@keyframes explode{
0%{
transform:translate(0,0) scale(0.5) rotate(45deg);
opacity:1;
}

100%{
transform:translate(var(--x),var(--y)) scale(1.6) rotate(45deg);
opacity:0;
}
}

/* background floating hearts */

.particle{
position:fixed;
width:12px;
height:12px;
background:#ff6aa9;
transform:rotate(45deg);
animation:float 10s linear infinite;
opacity:0.6;
}

.particle::before,
.particle::after{
content:"";
position:absolute;
width:12px;
height:12px;
background:#ff6aa9;
border-radius:50%;
}

.particle::before{top:-6px}
.particle::after{left:-6px}

@keyframes float{

0%{
transform:translateY(0) rotate(45deg);
opacity:0;
}

20%{
opacity:0.8;
}

100%{
transform:translateY(-120vh) rotate(45deg);
opacity:0;
}

}

@keyframes fadeIn{
from{opacity:0;transform:translateY(40px)}
to{opacity:1;transform:translateY(0)}
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.05)}
100%{transform:scale(1)}
}

</style>

</head>

<body>

<canvas id="bg"></canvas>

<div class="container">

<h1>For</h1>
<div class="name">ฟูนะ</div>

<button onclick="openBook()">กดดูข้อความ 💗</button>

</div>

<div class="book" id="book">

<div class="book-page">

<h2>ถึง ฟูนะ 💌</h2>

<p style="margin-top:15px">
ขอบคุณที่กลับเข้ามาอยู่กับน้อง
มันพิเศษมากไม่มีข้อความอ่ะไรจะพูดเยอะเลย...
💖
</p>

</div>

</div>

<div class="watermark">
I RIS HUB LOVE
</div>

<script>

function openBook(){

let book=document.getElementById("book");

book.classList.add("open");

heartExplosion();

}

function heartExplosion(){

for(let i=0;i<120;i++){

let heart=document.createElement("div");

heart.className="heart";

let x=(Math.random()*600-300)+"px";
let y=(Math.random()*600-300)+"px";

heart.style.setProperty("--x",x);
heart.style.setProperty("--y",y);

heart.style.left="50%";
heart.style.top="50%";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},2000);

}

}

/* background particles */

function createParticles(){

for(let i=0;i<40;i++){

let p=document.createElement("div");

p.className="particle";

p.style.left=Math.random()*100+"vw";
p.style.bottom="-20px";

p.style.animationDuration=(8+Math.random()*8)+"s";

document.body.appendChild(p);

}

}

createParticles();

</script>

</body>
</html>
